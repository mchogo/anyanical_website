<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>トレードタロット — 今宵、カードに尋ねる</title>
<meta name="description" content="トレーダーのための夜の占い館。相場の迷いをカードに尋ねてみませんか。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#030d22;
    --navy-2:#081231;
    --navy-3:#0d1c42;
    --gold:#c9a94f;
    --gold-2:#e0c47a;
    --ivory:#e8d9a8;
    --danger:#d97a7a;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--navy);
    color:var(--ivory);
    font-family:'Noto Sans JP',sans-serif;
    overflow-x:hidden;
  }
  body{
    min-height:100vh;
    position:relative;
  }
  h1,h2,h3,.serif{ font-family:'Shippori Mincho',serif; }

  /* ===== Background canvas ===== */
  #bgCanvas{
    position:fixed; inset:0; width:100%; height:100%;
    z-index:0; pointer-events:none;
    background:
      radial-gradient(ellipse at 50% 0%, #0b1c4a 0%, #030d22 55%, #01050f 100%);
  }
  .vignette{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    box-shadow: inset 0 0 180px 60px rgba(0,0,0,0.75);
  }

  /* ===== Candles ===== */
  .candle-wrap{
    position:fixed; bottom:0; z-index:3; width:70px; pointer-events:none;
    display:flex; flex-direction:column; align-items:center;
    filter: drop-shadow(0 0 18px rgba(255,190,90,0.35));
  }
  .candle-wrap.left{ left:1%; }
  .candle-wrap.right{ right:1%; }
  .flame-outer{
    width:20px; height:46px; margin-bottom:-6px;
    position:relative;
    transform-origin:bottom center;
    animation: flicker 2.4s infinite ease-in-out;
  }
  .candle-wrap.right .flame-outer{ animation-delay:-1.1s; animation-duration:2.7s; }
  .flame-outer::before{
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse 60% 90% at 50% 65%, #fff7da 0%, #ffd166 35%, #f5a623 65%, rgba(245,166,35,0) 78%);
    border-radius:50% 50% 50% 50% / 62% 62% 38% 38%;
  }
  .flame-outer::after{
    content:''; position:absolute; left:50%; top:58%; width:6px; height:16px;
    transform:translateX(-50%);
    background: radial-gradient(ellipse, #dbeeff 0%, #7fb4ff 60%, rgba(127,180,255,0) 100%);
    border-radius:50%;
    opacity:0.85;
  }
  @keyframes flicker{
    0%,100%{ transform:scaleY(1) scaleX(1) rotate(0deg); }
    12%{ transform:scaleY(1.08) scaleX(0.92) rotate(-3deg); }
    27%{ transform:scaleY(0.9) scaleX(1.08) rotate(2deg); }
    41%{ transform:scaleY(1.12) scaleX(0.88) rotate(-2deg); }
    58%{ transform:scaleY(0.93) scaleX(1.04) rotate(4deg); }
    73%{ transform:scaleY(1.05) scaleX(0.95) rotate(-4deg); }
    88%{ transform:scaleY(0.95) scaleX(1.06) rotate(1deg); }
  }
  .candle-body{
    width:26px; height:120px;
    background:linear-gradient(180deg,#f7edd2 0%,#e9d4a0 55%,#d8bd80 100%);
    border-radius:3px 3px 2px 2px;
    box-shadow: inset -6px 0 10px rgba(0,0,0,0.25), inset 3px 0 6px rgba(255,255,255,0.25);
    position:relative;
  }
  .candle-drip{
    position:absolute; top:6px; left:4px; width:5px; height:22px;
    background:linear-gradient(180deg,#fff6df,#e9d4a0);
    border-radius:0 0 50% 50%;
  }
  .candle-holder{
    width:44px; height:12px; border-radius:3px;
    background:linear-gradient(180deg,var(--gold-2),#8a6d2c);
  }
  @media (max-width: 780px){
    .candle-wrap{ display:none; }
  }

  /* ===== Layout ===== */
  .app{
    position:relative; z-index:10;
    max-width:760px; margin:0 auto;
    padding:32px 20px 80px;
    min-height:100vh;
  }
  .brand{
    text-align:center; margin-bottom:18px;
  }
  .brand .kicker{
    letter-spacing:.35em; font-size:11px; color:var(--gold-2); text-transform:uppercase;
  }
  .brand h1{
    font-size:clamp(28px,6vw,42px); margin:6px 0 0; font-weight:800;
    color:var(--ivory);
    text-shadow:0 0 26px rgba(201,169,79,0.45);
    letter-spacing:.06em;
  }
  .brand .sub{
    margin-top:8px; font-size:13px; color:#9fb0d8; letter-spacing:.05em;
  }

  .screen{ display:none; animation: fadeUp .6s ease both; }
  .screen.active{ display:block; }
  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .panel{
    background:linear-gradient(160deg, rgba(13,28,66,0.72), rgba(3,13,34,0.85));
    border:1px solid rgba(201,169,79,0.35);
    border-radius:18px;
    padding:26px 22px;
    box-shadow:0 20px 60px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.04);
    backdrop-filter: blur(2px);
  }

  .prompt-title{
    text-align:center; font-size:clamp(19px,4.4vw,25px); font-weight:700;
    color:var(--ivory); margin:0 0 18px;
  }

  textarea#questionInput{
    width:100%; min-height:96px; resize:vertical;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(201,169,79,0.4);
    border-radius:12px;
    color:var(--ivory);
    font-family:'Noto Sans JP',sans-serif;
    font-size:15px; line-height:1.7;
    padding:14px 16px;
    outline:none;
  }
  textarea#questionInput::placeholder{ color:#7488ad; }
  textarea#questionInput:focus{
    border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,169,79,0.15);
  }

  .chips{
    display:flex; flex-wrap:wrap; gap:8px; margin:16px 0 4px;
  }
  .chip{
    border:1px solid rgba(201,169,79,0.5);
    background:rgba(201,169,79,0.08);
    color:var(--gold-2);
    padding:8px 14px; border-radius:999px;
    font-size:13px; cursor:pointer; transition:.2s ease;
    user-select:none;
  }
  .chip:hover{ background:rgba(201,169,79,0.18); }
  .chip.selected{
    background:var(--gold); color:#1c1408; border-color:var(--gold);
    box-shadow:0 0 16px rgba(201,169,79,0.55);
    font-weight:700;
  }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    border:none; cursor:pointer;
    font-family:'Shippori Mincho',serif; font-weight:700; letter-spacing:.08em;
    transition:.2s ease; text-decoration:none;
  }
  .btn-primary{
    width:100%; margin-top:22px; padding:16px 20px; border-radius:14px;
    font-size:17px;
    background:linear-gradient(135deg,var(--gold-2),var(--gold));
    color:#1c1408;
    box-shadow:0 10px 30px rgba(201,169,79,0.35);
  }
  .btn-primary:active{ transform:scale(0.98); }
  .btn-primary:disabled{ opacity:.4; cursor:not-allowed; }

  .btn-ghost{
    background:transparent; color:var(--gold-2);
    border:1px solid rgba(201,169,79,0.4);
    padding:10px 18px; border-radius:999px; font-size:13px;
  }
  .btn-ghost:hover{ background:rgba(201,169,79,0.1); }

  .link-row{ text-align:center; margin-top:16px; }
  .link-row a{
    color:#9fb0d8; font-size:13px; text-decoration:underline; text-underline-offset:3px;
    cursor:pointer;
  }
  .link-row a:hover{ color:var(--gold-2); }

  /* ===== Draw screen ===== */
  .draw-header{ text-align:center; margin-bottom:8px; }
  .draw-header p{ color:#9fb0d8; font-size:13px; margin:4px 0 0; }

  .slots{
    display:flex; justify-content:center; gap:18px; margin:34px 0 20px;
    flex-wrap:wrap;
  }
  .slot{ text-align:center; }
  .slot-label{
    font-size:12px; color:var(--gold-2); letter-spacing:.2em; margin-bottom:10px;
    opacity:0; transform:translateY(6px);
    transition:opacity .5s ease, transform .5s ease;
  }
  .slot-label.show{ opacity:1; transform:translateY(0); }

  .card-slot{
    width:110px; height:180px; perspective:1200px;
    opacity:0; transform:translateY(-24px) scale(0.85);
  }
  .card-slot.dealt{
    animation: dealIn .6s cubic-bezier(.2,.8,.3,1) forwards;
  }
  @keyframes dealIn{
    0%{ opacity:0; transform:translateY(-40px) scale(0.7) rotate(-6deg); }
    60%{ opacity:1; transform:translateY(4px) scale(1.03) rotate(1deg); }
    100%{ opacity:1; transform:translateY(0) scale(1) rotate(0deg); }
  }

  .card{
    width:100%; height:100%; position:relative;
    transform-style:preserve-3d;
    transition:transform .85s cubic-bezier(.4,.2,.15,1);
    cursor:pointer;
  }
  .card.flipped{ transform:rotateY(180deg); cursor:default; }
  .card.locked{ pointer-events:none; }

  .card-face{
    position:absolute; inset:0; border-radius:12px;
    backface-visibility:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    border:2px solid var(--gold);
    overflow:hidden;
  }
  .card-back{
    background:
      repeating-linear-gradient(45deg, #0a1c48 0 8px, #0d234f 8px 16px);
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
  }
  .card-back-inner{
    width:74%; height:84%; border:1px solid rgba(201,169,79,0.6); border-radius:8px;
    display:flex; align-items:center; justify-content:center;
  }
  .card-back-emblem{ font-size:26px; color:var(--gold-2); opacity:.85; }
  .card-front{
    background:linear-gradient(165deg,#12275c,#050e26);
    transform:rotateY(180deg);
    padding:10px 8px;
    text-align:center;
    box-shadow: inset 0 0 24px rgba(201,169,79,0.12);
  }
  .card-front .num{ font-size:10px; color:var(--gold-2); letter-spacing:.15em; }
  .card-front .emoji{ font-size:32px; margin:6px 0 4px; }
  .card-front .name{ font-size:13px; font-family:'Shippori Mincho',serif; font-weight:700; line-height:1.35; color:var(--ivory); }
  .card-front .orient{
    margin-top:8px; font-size:10.5px; padding:2px 10px; border-radius:999px;
    border:1px solid var(--gold-2); color:var(--gold-2);
  }
  .card-front.reversed{ transform:rotateY(180deg) rotate(180deg); }

  .deck-hint{
    text-align:center; margin:6px 0 26px; color:#7488ad; font-size:12px;
  }

  .draw-actions{
    display:flex; gap:10px; justify-content:center; margin-top:18px; flex-wrap:wrap;
  }

  /* ===== Result screen ===== */
  .mini-cards{ display:flex; justify-content:center; gap:10px; margin-bottom:20px; }
  .mini-card{
    width:56px; height:88px; border-radius:8px; border:1px solid var(--gold);
    background:linear-gradient(165deg,#12275c,#050e26);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:20px;
  }
  .mini-card .mlabel{ font-size:8px; color:var(--gold-2); margin-top:2px; letter-spacing:.1em; }

  .reading-box{
    min-height:180px;
    white-space:pre-wrap; word-break:break-word;
    font-size:15px; line-height:2; color:#e9e3cf;
    cursor:pointer;
  }
  .reading-box .cursor{
    display:inline-block; width:2px; height:1em; background:var(--gold-2);
    margin-left:2px; vertical-align:-2px;
    animation:blink 1s step-end infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  .lesson-box{
    margin-top:22px; padding:20px 18px; border-radius:14px;
    text-align:center;
    background:linear-gradient(160deg, rgba(201,169,79,0.14), rgba(201,169,79,0.04));
    border:1px solid rgba(201,169,79,0.55);
    opacity:0; transform:translateY(10px);
    transition:opacity .6s ease, transform .6s ease;
  }
  .lesson-box.show{ opacity:1; transform:translateY(0); }
  .lesson-box .lk{ font-size:11px; letter-spacing:.3em; color:var(--gold-2); }
  .lesson-box .lt{
    font-family:'Shippori Mincho',serif; font-weight:800; font-size:clamp(19px,4.6vw,26px);
    margin-top:10px; color:var(--ivory);
    text-shadow:0 0 20px rgba(201,169,79,0.4);
  }

  .result-actions{
    display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:26px;
  }
  .btn-share{
    background:#000; color:#fff; border-radius:999px; padding:11px 20px; font-size:13px;
    font-family:'Noto Sans JP',sans-serif; font-weight:700;
  }
  .btn-copy{
    background:rgba(201,169,79,0.12); color:var(--gold-2); border:1px solid var(--gold);
    border-radius:999px; padding:11px 20px; font-size:13px; font-family:'Noto Sans JP',sans-serif; font-weight:700;
  }
  .btn-again{
    background:transparent; color:#9fb0d8; border:1px solid rgba(159,176,216,0.4);
    border-radius:999px; padding:11px 20px; font-size:13px; font-family:'Noto Sans JP',sans-serif; font-weight:700;
  }
  .btn-share:hover, .btn-copy:hover, .btn-again:hover{ filter:brightness(1.15); }

  .toast{
    position:fixed; left:50%; bottom:28px; transform:translate(-50%,20px);
    background:rgba(10,20,50,0.95); border:1px solid var(--gold);
    color:var(--ivory); padding:10px 20px; border-radius:999px; font-size:13px;
    opacity:0; pointer-events:none; transition:.35s ease; z-index:50;
  }
  .toast.show{ opacity:1; transform:translate(-50%,0); }

  /* ===== Sound toggle ===== */
  #soundToggle{
    position:fixed; top:16px; right:16px; z-index:40;
    width:44px; height:44px; border-radius:50%;
    background:rgba(3,13,34,0.7); border:1px solid rgba(201,169,79,0.5);
    color:var(--gold-2); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter: blur(4px);
  }
  #soundToggle:hover{ background:rgba(201,169,79,0.15); }

  ::selection{ background:rgba(201,169,79,0.4); }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="vignette"></div>

<div class="candle-wrap left">
  <div class="flame-outer"></div>
  <div class="candle-body"><div class="candle-drip"></div></div>
  <div class="candle-holder"></div>
</div>
<div class="candle-wrap right">
  <div class="flame-outer"></div>
  <div class="candle-body"><div class="candle-drip"></div></div>
  <div class="candle-holder"></div>
</div>

<button id="soundToggle" aria-label="サウンド切り替え" title="サウンド ON/OFF">🔔</button>

<div class="app">

  <div class="brand">
    <div class="kicker">Trade Tarot</div>
    <h1>トレードタロット</h1>
    <div class="sub">夜の占い館 — 相場の迷いに、カードは静かに応える</div>
  </div>

  <!-- ===================== TOP SCREEN ===================== -->
  <section id="screen-top" class="screen active">
    <div class="panel">
      <p class="prompt-title">今宵は、何を占いましょう</p>
      <textarea id="questionInput" placeholder="例）ポジポジ病が治りません…／損切りがどうしても遅れてしまう"></textarea>

      <div class="chips" id="categoryChips">
        <div class="chip" data-cat="エントリーの迷い">エントリーの迷い</div>
        <div class="chip" data-cat="損切りできない">損切りできない</div>
        <div class="chip" data-cat="メンタル">メンタル</div>
        <div class="chip" data-cat="資金管理">資金管理</div>
        <div class="chip" data-cat="成長・継続">成長・継続</div>
      </div>

      <button class="btn btn-primary" id="startReadingBtn">🔮 カードに尋ねる</button>

      <div class="link-row">
        <a id="dailyDrawLink">今日の一枚だけ引く →</a>
      </div>
    </div>
  </section>

  <!-- ===================== DRAW SCREEN ===================== -->
  <section id="screen-draw" class="screen">
    <div class="panel">
      <div class="draw-header">
        <h2 class="serif" style="margin:0;font-size:20px;">カードがあなたを待っています</h2>
        <p id="drawHint">タップしてカードをめくってください</p>
      </div>

      <div class="slots" id="slotsContainer"></div>
      <div class="deck-hint" id="deckHint"></div>

      <div class="draw-actions">
        <button class="btn btn-ghost" id="flipAllBtn">すべてめくる</button>
      </div>
    </div>
  </section>

  <!-- ===================== RESULT SCREEN ===================== -->
  <section id="screen-result" class="screen">
    <div class="panel">
      <h2 class="serif" style="text-align:center;margin:0 0 16px;font-size:20px;">鑑定結果</h2>
      <div class="mini-cards" id="miniCards"></div>

      <div class="reading-box" id="readingBox"></div>

      <div class="lesson-box" id="lessonBox">
        <div class="lk">今宵の戒め</div>
        <div class="lt" id="lessonText"></div>
      </div>

      <div class="result-actions">
        <button class="btn btn-share" id="shareBtn">𝕏 でシェア</button>
        <button class="btn btn-copy" id="copyBtn">結果をコピー</button>
        <button class="btn btn-again" id="againBtn">もう一度占う</button>
      </div>
    </div>
  </section>

</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

/* =========================================================================
   1. カードデータ（トレーダー版 大アルカナ 22枚）
   ========================================================================= */
const TAROT_CARDS = [
  { id:0,  roman:'0',    name:'はじまりのエントリー', eng:'THE FOOL', emoji:'🌱',
    upright:'新しい手法への好奇心が学びを呼ぶ。ロットは最小で小さく試すとき。',
    reversed:'根拠のない「なんとなくエントリー」の警告。入る前に一行根拠を書き出して。',
    lesson:'根拠を書けないなら、入らない' },
  { id:1,  roman:'I',    name:'手法の魔術師', eng:'THE MAGICIAN', emoji:'🪄',
    upright:'道具は揃っている。決めた型を淡々と繰り出すとき。新武器は不要。',
    reversed:'聖杯探しのつまみ食い状態。インジケーターを増やすより軸を絞って。',
    lesson:'聖杯は探すものではなく、育てるもの' },
  { id:2,  roman:'II',   name:'静観の女教皇', eng:'THE HIGH PRIESTESS', emoji:'🔮',
    upright:'「待つ」判断が光るとき。チャートを閉じる静けさが次のチャンスを呼ぶ。',
    reversed:'直感という名の思い込みに注意。その直感を裏付けるデータはあるか？',
    lesson:'待てない病に、良い縁は寄りつかない' },
  { id:3,  roman:'III',  name:'複利の女帝', eng:'THE EMPRESS', emoji:'🌳',
    upright:'小さな成果を守り育てる。慌てて刈り取らず複利を味方に。',
    reversed:'成果を急ぎすぎている。増やすことより減らさないことに軸足を。',
    lesson:'複利は、退場しなかった者だけの果実' },
  { id:4,  roman:'IV',   name:'ルールの皇帝', eng:'THE EMPEROR', emoji:'👑',
    upright:'自分で決めたルールが王座を守る。明文化された掟が力になる。',
    reversed:'ルールを「今回だけ」曲げたくなる誘惑あり。例外を作ればルールは崩壊する。',
    lesson:'ルールを守れない日は、席を立つ' },
  { id:5,  roman:'V',    name:'検証の教皇', eng:'THE HIEROPHANT', emoji:'📜',
    upright:'過去検証や取引記録が導きになる。自分のデータに耳を傾けて。',
    reversed:'他人の相場観を鵜呑みにしていないか。誰かの一言より検証ノートの一行。',
    lesson:'他人のポジションは、あなたを守らない' },
  { id:6,  roman:'VI',   name:'相性の恋人', eng:'THE LOVERS', emoji:'💞',
    upright:'相性の良い通貨ペアや得意な時間帯と噛み合う。得意な土俵を選ぶのが戦略。',
    reversed:'合わない相場に片思い中。すべての波に乗る必要はない。静かに離れて。',
    lesson:'すべての相場と付き合う必要はない' },
  { id:7,  roman:'VII',  name:'トレンドの戦車', eng:'THE CHARIOT', emoji:'🐎',
    upright:'流れに乗る力が高まる。伸ばす勇気と、決めた線で降りる冷静さを両方握って。',
    reversed:'暴走の気配。連勝のあとこそ手綱が緩む。ブレーキの点検を。',
    lesson:'連勝の後の一手が、いちばん高くつく' },
  { id:8,  roman:'VIII', name:'握力', eng:'STRENGTH', emoji:'💪',

/* =========================================================================
   2. Web Audio API — サウンドエンジン
   ========================================================================= */
const SoundEngine = (() => {
  let ctx = null;
  let enabled = true;

  function getCtx(){
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function setEnabled(v){ enabled = v; }
  function isEnabled(){ return enabled; }

  // シュッ（カードを配る音）: フィルタ処理したノイズバースト
  function playDeal(){
    if (!enabled) return;
    try{
      const c = getCtx();
      const dur = 0.16;
      const bufferSize = Math.floor(c.sampleRate * dur);
      const buffer = c.createBuffer(1, bufferSize, c.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i=0;i<bufferSize;i++){
        data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
      }
      const noise = c.createBufferSource();
      noise.buffer = buffer;
      const bp = c.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.setValueAtTime(3800, c.currentTime);
      bp.frequency.exponentialRampToValueAtTime(600, c.currentTime + dur);
      bp.Q.value = 0.9;
      const gain = c.createGain();
      gain.gain.setValueAtTime(0.3, c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      noise.connect(bp).connect(gain).connect(c.destination);
      noise.start();
      noise.stop(c.currentTime + dur + 0.02);
    }catch(e){ /* noop */ }
  }

  // チリーン（カードをめくる音）: ベル風の倍音
  function playFlip(){
    if (!enabled) return;
    try{
      const c = getCtx();
      const freqs = [1567.98, 2093.00, 3135.96];
      freqs.forEach((f,i)=>{
        const osc = c.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = f;
        const gain = c.createGain();
        const start = c.currentTime + i*0.012;
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.linearRampToValueAtTime(0.16/(i+1), start+0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, start+0.55);
        osc.connect(gain).connect(c.destination);
        osc.start(start);
        osc.stop(start+0.6);
      });
    }catch(e){ /* noop */ }
  }

  // 結果発表音: アルペジオ和音
  function playReveal(){
    if (!enabled) return;
    try{
      const c = getCtx();
      const notes = [523.25, 659.25, 783.99, 1046.50];
      notes.forEach((f,i)=>{
        const osc = c.createOscillator();
        osc.type = 'triangle';
        osc.frequency.value = f;
        const gain = c.createGain();
        const start = c.currentTime + i*0.13;
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.linearRampToValueAtTime(0.18, start+0.04);
        gain.gain.exponentialRampToValueAtTime(0.0001, start+0.9);
        osc.connect(gain).connect(c.destination);
        osc.start(start);
        osc.stop(start+0.95);
      });
    }catch(e){ /* noop */ }
  }

  // 軽いUIタップ音
  function playTap(){
    if (!enabled) return;
    try{
      const c = getCtx();
      const osc = c.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 900;
      const gain = c.createGain();
      gain.gain.setValueAtTime(0.08, c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, c.currentTime+0.1);
      osc.connect(gain).connect(c.destination);
      osc.start();
      osc.stop(c.currentTime+0.12);
    }catch(e){ /* noop */ }
  }

  return { setEnabled, isEnabled, playDeal, playFlip, playReveal, playTap, getCtx };
})();

/* =========================================================================
   3. Mulberry32 PRNG + Daily seed
   ========================================================================= */
function mulberry32(seed){
  return function(){
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function hashString(str){
  let hash = 0;
  for (let i=0;i<str.length;i++){
    hash = (Math.imul(31, hash) + str.charCodeAt(i)) | 0;
  }
  return hash >>> 0;
}

function getUserSeedId(){
  let id = localStorage.getItem('tt_user_seed_id');
  if (!id){
    id = String(Math.floor(Math.random()*1e9)) + '-' + Date.now();
    localStorage.setItem('tt_user_seed_id', id);
  }
  return id;
}

function todayDateStr(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function getDailySeed(){
  const combined = todayDateStr() + '::' + getUserSeedId();
  return hashString(combined);
}

function drawDailyCard(){
  const rng = mulberry32(getDailySeed());
  const idx = Math.floor(rng() * TAROT_CARDS.length);
  const reversed = rng() < 0.5;
  return { card: TAROT_CARDS[idx], reversed };
}

/* =========================================================================
   4. 星空・金の粉・流れ星（Canvas）
   ========================================================================= */
const StarField = (() => {
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let stars = [], dust = [], shootingStars = [];
  let w = 0, h = 0;

  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  function newDust(){
    return {
      x: Math.random()*w,
      y: h + Math.random()*80,
      r: Math.random()*1.8 + 0.5,
      speed: Math.random()*0.35 + 0.15,
      drift: (Math.random()-0.5)*0.3,
      alpha: Math.random()*0.5 + 0.35,
    };
  }

  function init(){
    resize();
    const count = Math.max(60, Math.floor((w*h)/7000));
    stars = Array.from({length: count}, () => ({
      x: Math.random()*w, y: Math.random()*h*0.9,
      r: Math.random()*1.3 + 0.3,
      phase: Math.random()*Math.PI*2,
      speed: Math.random()*0.03 + 0.01,
    }));
    dust = Array.from({length: 36}, newDust);
  }

  function spawnShootingStar(){
    shootingStars.push({
      x: Math.random()*w*0.6 + w*0.1,
      y: Math.random()*h*0.25,
      vx: 7 + Math.random()*5,
      vy: 3 + Math.random()*2.5,
      life: 1,
    });
  }

  function draw(t){
    ctx.clearRect(0,0,w,h);

    stars.forEach(s=>{
      const tw = 0.5 + 0.5*Math.sin(t*s.speed + s.phase);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(232,217,168,${(0.25 + tw*0.65).toFixed(3)})`;
      ctx.fill();
    });

    dust.forEach(d=>{
      d.y -= d.speed;
      d.x += d.drift;
      if (d.y < -10){ Object.assign(d, newDust()); d.y = h + 10; }
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(201,169,79,${d.alpha.toFixed(3)})`;
      ctx.fill();
    });

    if (Math.random() < 0.0035) spawnShootingStar();
    shootingStars = shootingStars.filter(s=>s.life > 0);
    shootingStars.forEach(s=>{
      ctx.save();
      const grad = ctx.createLinearGradient(s.x, s.y, s.x - s.vx*10, s.y - s.vy*10);
      grad.addColorStop(0, `rgba(255,255,255,${s.life})`);
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x - s.vx*10, s.y - s.vy*10);
      ctx.stroke();
      ctx.restore();
      s.x += s.vx; s.y += s.vy; s.life -= 0.018;
    });
  }

  function start(){
    let last = 0;
    function loop(ts){
      draw(ts*0.05);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', () => { init(); });
  init();

  return { start };
})();

/* =========================================================================
   6. ドロー処理
   ========================================================================= */
function shuffledDeck(){
  const arr = TAROT_CARDS.slice();
  for (let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function beginDraw(count){
  showScreen('draw');
  App.drawn = [];
  App.flippedCount = 0;

  const slotsContainer = $('#slotsContainer');
  slotsContainer.innerHTML = '';
  $('#deckHint').textContent = '';
  $('#drawHint').textContent = 'タップしてカードをめくってください';

  let slotDefs;
  if (count === 3){
    slotDefs = [
      { key:'past', label:'これまでのあなた' },
      { key:'present', label:'いまのあなた' },
      { key:'future', label:'これからのあなた' },
    ];
    const deck = shuffledDeck();
    App.drawn = slotDefs.map((s,i)=>({
      slot:s.key, label:s.label,
      card: deck[i],
      reversed: Math.random() < 0.5,
      flipped:false,
    }));
  } else {
    slotDefs = [ { key:'present', label:'今日のあなたへ' } ];
    const d = drawDailyCard();
    App.drawn = [{ slot:'present', label:'今日のあなたへ', card:d.card, reversed:d.reversed, flipped:false }];
  }

  // スロットDOM生成
  App.drawn.forEach((entry, idx)=>{
    const wrap = document.createElement('div');
    wrap.className = 'slot';
    wrap.innerHTML = `
      <div class="slot-label" data-idx="${idx}">${entry.label}</div>
      <div class="card-slot" data-idx="${idx}">
        <div class="card" data-idx="${idx}">
          <div class="card-face card-back">
            <div class="card-back-inner"><div class="card-back-emblem">✦</div></div>
          </div>
          <div class="card-face card-front">
            <div class="num">${entry.card.roman}</div>
            <div class="emoji">${entry.card.emoji}</div>
            <div class="name">${entry.card.name}</div>
            <div class="orient">${entry.reversed ? '逆位置' : '正位置'}</div>
          </div>
        </div>
      </div>
    `;
    slotsContainer.appendChild(wrap);
  });

  // 配布アニメーション（時間差）
  const cardSlots = $all('.card-slot');
  const labels = $all('.slot-label');
  cardSlots.forEach((el, i)=>{
    setTimeout(()=>{
      SoundEngine.playDeal();
      el.classList.add('dealt');
      labels[i].classList.add('show');
    }, i*380);
  });

  // クリックでめくる
  $all('.card').forEach(cardEl=>{
    cardEl.addEventListener('click', ()=> flipCard(parseInt(cardEl.dataset.idx,10)));
  });

  $('#flipAllBtn').disabled = false;
}

function flipCard(idx){
  const entry = App.drawn[idx];
  if (!entry || entry.flipped) return;
  entry.flipped = true;
  App.flippedCount++;
  const cardEl = document.querySelector(`.card[data-idx="${idx}"]`);
  cardEl.classList.add('flipped','locked');
  SoundEngine.playFlip();

  if (App.flippedCount >= App.drawn.length){
    $('#drawHint').textContent = 'カードが出そろいました…';
    setTimeout(()=> goToResult(), 900);
  }
}

$('#flipAllBtn').addEventListener('click', ()=>{
  App.drawn.forEach((entry, idx)=>{
    if (!entry.flipped){
      setTimeout(()=> flipCard(idx), idx*260);
    }
  });
});

function describeCard(entry){
  const meaning = entry.reversed ? entry.card.reversed : entry.card.upright;
  const orient = entry.reversed ? '逆位置' : '正位置';
  return `【${entry.label}】 ${entry.card.emoji} ${entry.card.name}（${orient}）\n${meaning}`;
}

function generateReading(){
  const intro = App.isDaily
    ? '今日という一日に、カードはこう寄り添います。\n\n'
    : (App.category ? `「${App.category}」について、カードはこう語りかけます。\n\n` : 'カードはこう語りかけます。\n\n');

  const body = App.drawn.map(describeCard).join('\n\n');

  const outro = App.isDaily
    ? '\n\n今日という日を、静かに大切に過ごしてください。'
    : '\n\nカードたちの声に、今宵は静かに耳を澄ませてみてください。';

  return intro + body + outro;
}

function getPresentEntry(){
  return App.drawn.find(e => e.slot === 'present') || App.drawn[App.drawn.length-1];
}

/* =========================================================================
   8. タイプライター演出
   ========================================================================= */
let typewriterState = { timer:null, skip:false, onDone:null };

function typewriterEffect(text, el, onComplete){
  el.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  let i = 0;
  typewriterState.skip = false;
  typewriterState.onDone = onComplete;

  function finishNow(){
    typewriterState.skip = true;
  }

  el.onclick = finishNow;

  function step(){
    if (typewriterState.skip){
      el.textContent = text;
      if (onComplete) onComplete();
      return;
    }
    if (i < text.length){
      el.textContent = text.slice(0, i+1);
      i++;
      typewriterState.timer = setTimeout(step, 28);
    } else {
      if (onComplete) onComplete();
    }
  }
  step();
}

    miniWrap.appendChild(el);

  $('#lessonBox').classList.remove('show');
  const readingBox = $('#readingBox');
  const readingText = generateReading();

    $('#lessonBox').classList.add('show');
  });
}

  const present = getPresentEntry();
  const lesson = present.card.lesson;
  return `【トレードタロット】\n今宵のカード：${present.card.emoji} ${present.card.name}（${present.reversed?'逆':'正'}位置）\n今宵の戒め：「${lesson}」\n\n#トレードタロット #FX #トレード`;
}

$('#shareBtn').addEventListener('click', ()=>{
  const text = buildShareText();
  const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
  window.open(url, '_blank', 'noopener,noreferrer');
});

$('#copyBtn').addEventListener('click', async ()=>{
  const text = buildShareText();
  try{
    await navigator.clipboard.writeText(text);
    showToast('結果をコピーしました');
  }catch(e){
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try{ document.execCommand('copy'); showToast('結果をコピーしました'); }
    catch(_){ showToast('コピーに失敗しました'); }
    document.body.removeChild(ta);
  }
});

$('#againBtn').addEventListener('click', ()=>{
  App.drawn = [];
  App.flippedCount = 0;
  $('#questionInput').value = '';
  $all('.chip').forEach(c=>c.classList.remove('selected'));
  App.category = null;
  showScreen('top');
});

/* =========================================================================
   11. 初期化
   ========================================================================= */
StarField.start();
</script>
</body>
</html>
